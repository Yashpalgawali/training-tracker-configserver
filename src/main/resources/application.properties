spring.application.name=trainingtrackerconfigserver
server.servlet.context-path=/trainingtrackerconfigserver

server.port=8071

spring.profiles.active=git

spring.cloud.config.server.git.uri=https://github.com/Yashpalgawali/training-tracker-config.git
spring.cloud.config.server.git.force-pull=true
spring.cloud.config.server.git.clone-on-start=true
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.timeout=5


